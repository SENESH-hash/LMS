<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PGIM LMS — Learning Management System</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #F9FAFB; }
  input, select, textarea { font-family: inherit; }
  button { font-family: inherit; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #8B000040; border-radius: 3px; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { padding: 10px 14px; text-align: left; color: #8B0000; font-weight: 700; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; background: rgba(139,0,0,0.05); border-bottom: 2px solid rgba(139,0,0,0.13); }
  td { padding: 12px 14px; color: #374151; border-bottom: 1px solid #F3F4F6; }
  tr:nth-child(even) td { background: #F9FAFB; }
  .progress-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar-bg { flex: 1; background: #E5E7EB; border-radius: 999px; height: 7px; }
  .progress-bar-fill { border-radius: 999px; height: 7px; transition: width 0.4s; }
</style>
</head>
<body>
<div id="app"></div>

<script>

  gray50: "#F9FAFB", gray100: "#F3F4F6", gray200: "#E5E7EB",
  gray300: "#D1D5DB", gray400: "#9CA3AF", gray500: "#6B7280",
  gray700: "#374151", gray800: "#1F2937",
  green: "#15803D", greenBg: "#DCFCE7",
  red: "#DC2626", redBg: "#FEE2E2",
  blue: "#1D4ED8", blueBg: "#DBEAFE",

// ─── Synthetic Data ───────────────────────────────────────────────────────────
const USERS = {

  examiner: { id: "EXM-001", name: "Dr. Kasun Jayawardena", role: "Examiner", title: "Senior Examiner — Internal Medicine",   email: "k.jayawardena@pgim.lk",  initials: "KJ" },
  trainee:  { id: "TRN-001", name: "Dr. Amali Wijesinghe",  role: "Trainee",  title: "MD Trainee — Internal Medicine (Year 2)", email: "a.wijesinghe@pgim.lk", initials: "AW" },
};

const COURSES = [
  { id: "C001", name: "MD in Internal Medicine",   code: "MED-MD-2024", seats: 15, enrolled: 12, status: "Open",   fee: 45000, duration: "3 Years" },
  { id: "C002", name: "Diploma in Child Health",    code: "DCH-2024",    seats: 20, enrolled: 18, status: "Open",   fee: 25000, duration: "1 Year"  },
  { id: "C003", name: "MSc in Medical Education",  code: "MEd-MSc-2024", seats: 10, enrolled: 10, status: "Closed", fee: 60000, duration: "2 Years" },

let PORTFOLIO_ENTRIES = [
  { id: "P001", type: "Clinical Case",    title: "Management of Diabetic Ketoacidosis",    date: "2026-04-10", competency: "Clinical Reasoning",  status: "Signed Off",     feedback: "Excellent documentation. Demonstrates strong analytical thinking and evidence-based approach.", grade: "Excellent" },

  { id: "P003", type: "Teaching Session", title: "Lecture on Heart Failure Management",     date: "2026-04-18", competency: "Teaching & Learning", status: "Draft",          feedback: "", grade: "" },

  { id: "R002", candidate: "Dr. Ruwan Fernando",    pgimId: "TRN-002", examId: "EX001", score: 58, grade: "Fail", published: false, appealed: false, appealText: "", appealStatus: null },
  { id: "R003", candidate: "Dr. Shalini Gunaratna", pgimId: "TRN-003", examId: "EX001", score: 81, grade: "Pass", published: false, appealed: false, appealText: "", appealStatus: null },
];

let AUDIT_LOG = [
  { id: 1, user: "Dr. Amali Wijesinghe",  role: "Trainee",  action: "Logged in via SSO",                                          ip: "192.168.1.42", timestamp: "2026-04-22 09:15:33" },
  { id: 2, user: "Dr. Amali Wijesinghe",  role: "Trainee",  action: "Submitted portfolio entry: DKA Case Management",             ip: "192.168.1.42", timestamp: "2026-04-22 09:32:11" },
  { id: 3, user: "Dr. Kasun Jayawardena", role: "Examiner", action: "Logged in via SSO",                                          ip: "10.0.0.55",    timestamp: "2026-04-22 10:05:47" },
  { id: 4, user: "Dr. Kasun Jayawardena", role: "Examiner", action: "Signed off portfolio entry P001 — DKA Case",                 ip: "10.0.0.55",    timestamp: "2026-04-22 10:18:22" },
  { id: 5, user: "Dr. Nayomi Perera",     role: "Admin",    action: "Logged in via SSO",                                          ip: "172.16.0.10",  timestamp: "2026-04-22 11:00:01" },
  { id: 6, user: "Dr. Nayomi Perera",     role: "Admin",    action: "Created exam session EX001 — MD Internal Medicine Part I",   ip: "172.16.0.10",  timestamp: "2026-04-22 11:14:55" },
];

// ─── App State ────────────────────────────────────────────────────────────────
let APP = {
  user: null,
  nav: "dashboard",
  toast: null,
  toastTimeout: null,
  showRoleSwitch: false,
  prevRole: null,
  // login screen state
  loginSelected: null,
  loginPhase: "select", // select | sso
  loginLoading: false,
  // modal state
  modal: null,
  modalData: {},
};

// ─── Utility: render ──────────────────────────────────────────────────────────
function render() {
  document.getElementById("app").innerHTML = buildApp();
  attachEvents();
}

function ts() {
  return new Date().toLocaleString("sv").replace("T", " ").slice(0, 19);
}

function addAudit(action) {
  const u = APP.user || USERS.admin;
  AUDIT_LOG.unshift({ id: AUDIT_LOG.length + 1, user: u.name, role: u.role, action, ip: "172.16.0.10", timestamp: ts() });
}

function showToast(msg, type = "success") {
  APP.toast = { msg, type };
  clearTimeout(APP.toastTimeout);
  render();
  APP.toastTimeout = setTimeout(() => { APP.toast = null; render(); }, 3200);
}

// ─── Primitives ───────────────────────────────────────────────────────────────
function badge(text, color = "gray") {
  const map = {
    green:   { bg: C.greenBg,            text: C.green  },
    red:     { bg: C.redBg,              text: C.red    },
    amber:   { bg: C.amberBg,            text: C.amber  },
    blue:    { bg: C.blueBg,             text: C.blue   },
    gray:    { bg: C.gray100,            text: C.gray700},
    crimson: { bg: "#FCE7E7",            text: C.crimson},
    gold:    { bg: C.goldPale,           text: C.gold   },
  };
  const s = map[color] || map.gray;
  return `<span style="background:${s.bg};color:${s.text};padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;letter-spacing:0.3px;display:inline-block;text-transform:uppercase">${text}</span>`;
}

function btn(id, label, variant = "primary", size = "md", disabled = false) {
  const sizes = { sm: "6px 14px;font-size:12.5px", md: "10px 20px;font-size:14px", lg: "13px 28px;font-size:15.5px" };
  const variants = {
    primary:   `background:${C.crimson};color:${C.white}`,
    gold:      `background:${C.gold};color:${C.white}`,
    secondary: `background:transparent;color:${C.crimson};border:1.5px solid ${C.crimson}`,
    ghost:     `background:${C.gray100};color:${C.gray700}`,
    success:   `background:${C.green};color:${C.white}`,
    danger:    `background:${C.red};color:${C.white}`,
    navy:      `background:${C.navy};color:${C.white}`,
  };
  const dis = disabled ? "opacity:0.5;cursor:not-allowed;" : "cursor:pointer;";
  return `<button data-action="${id}" style="border:none;border-radius:7px;${dis}font-family:inherit;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:${sizes[size]};${variants[variant]}" ${disabled ? "disabled" : ""}>${label}</button>`;
}

function progressBar(pct) {
  const fill = pct >= 90 ? C.red : pct >= 60 ? C.green : C.amber;
  return `<div class="progress-bar-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${fill}"></div></div><span style="font-size:12px;color:${C.gray500};min-width:32px;text-align:right">${pct}%</span></div>`;
}

function card(content, style = "") {
  return `<div style="background:${C.white};border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.07);border:1px solid ${C.gray200};padding:22px;${style}">${content}</div>`;
}

function statCard(label, value, icon, accent = C.crimson, sub = "") {
  return card(`<div style="display:flex;align-items:center;gap:16px"><div style="width:48px;height:48px;border-radius:10px;background:${accent}22;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${icon}</div><div><div style="font-size:26px;font-weight:800;color:${accent};line-height:1">${value}</div><div style="font-size:12.5px;color:${C.gray500};margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px">${label}</div>${sub ? `<div style="font-size:11.5px;color:${C.gray400};margin-top:2px">${sub}</div>` : ""}</div></div>`, "padding:18px 22px");
}

function sectionTitle(title, sub = "", actionHtml = "") {
  return `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px"><div><h2 style="margin:0;color:${C.crimson};font-size:21px;font-weight:800">${title}</h2>${sub ? `<p style="margin:5px 0 0;color:${C.gray500};font-size:13px">${sub}</p>` : ""}</div>${actionHtml}</div>`;
}

function tableHtml(headers, rows) {
  const ths = headers.map(h => `<th>${h}</th>`).join("");
  const trs = rows.map(row => `<tr>${row.map(cell => `<td>${cell ?? ""}</td>`).join("")}</tr>`).join("");
  return `<div style="overflow-x:auto"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}

function formInput(id, label, type = "text", value = "", placeholder = "", required = false, readonly = false) {
  const req = required ? `<span style="color:${C.red}"> *</span>` : "";
  const ro = readonly ? "readonly style=\"background:#F9FAFB\"" : "";
  return `<div style="margin-bottom:14px"><label style="display:block;font-size:12.5px;font-weight:700;color:${C.gray700};margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px">${label}${req}</label><input id="${id}" type="${type}" value="${value.replace(/"/g, '&quot;')}" placeholder="${placeholder}" ${ro} style="width:100%;padding:10px 13px;border:1.5px solid ${C.gray200};border-radius:7px;font-size:13.5px;color:${C.gray800};outline:none;box-sizing:border-box;font-family:inherit" /></div>`;
}

function formSelect(id, label, options, value = "", required = false) {
  const req = required ? `<span style="color:${C.red}"> *</span>` : "";
  const opts = options.map(o => `<option value="${o.value}" ${o.value === value ? "selected" : ""}>${o.label}</option>`).join("");
  return `<div style="margin-bottom:14px"><label style="display:block;font-size:12.5px;font-weight:700;color:${C.gray700};margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px">${label}${req}</label><select id="${id}" style="width:100%;padding:10px 13px;border:1.5px solid ${C.gray200};border-radius:7px;font-size:13.5px;color:${C.gray800};background:${C.white};outline:none;box-sizing:border-box;font-family:inherit">${opts}</select></div>`;
}

function formTextarea(id, label, value = "", placeholder = "", required = false) {
  const req = required ? `<span style="color:${C.red}"> *</span>` : "";
  return `<div style="margin-bottom:14px"><label style="display:block;font-size:12.5px;font-weight:700;color:${C.gray700};margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px">${label}${req}</label><textarea id="${id}" placeholder="${placeholder}" style="width:100%;padding:10px 13px;border:1.5px solid ${C.gray200};border-radius:7px;font-size:13.5px;color:${C.gray800};outline:none;box-sizing:border-box;font-family:inherit;min-height:90px;resize:vertical">${value}</textarea></div>`;
}

function modalWrap(title, content, wide = false) {
  return `<div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="background:${C.white};border-radius:12px;width:100%;max-width:${wide ? 720 : 500}px;max-height:92vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.22)">
      <div style="padding:18px 24px;border-bottom:1px solid ${C.gray200};display:flex;justify-content:space-between;align-items:center;background:${C.gray50};border-radius:12px 12px 0 0">
        <h3 style="margin:0;color:${C.crimson};font-size:17px;font-weight:700">${title}</h3>
        <button data-action="close-modal" style="background:none;border:none;font-size:20px;cursor:pointer;color:${C.gray400};line-height:1">✕</button>
      </div>
      <div style="padding:24px">${content}</div>
    </div>
  </div>`;
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function buildLogin() {
  if (APP.loginPhase === "sso") {
    return `<div style="min-height:100vh;background:linear-gradient(135deg,${C.crimsonDark} 0%,${C.crimson} 60%,#6B0000 100%);display:flex;align-items:center;justify-content:center;padding:20px">
      ${card(`
        <div style="text-align:center;padding:12px">
          <div style="width:64px;height:64px;border-radius:50%;background:${C.goldPale};display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px">🔐</div>
          <h2 style="color:${C.crimson};font-size:20px;margin-bottom:6px">PGIM Identity Provider</h2>
          <p style="color:${C.gray500};font-size:13px;margin-bottom:4px">Simulated SSO Redirect (OIDC / OpenID Connect)</p>
          <div style="background:${C.amberBg};border:1px solid ${C.gold}50;border-radius:8px;padding:10px;font-size:12px;color:${C.amber};margin-bottom:20px;text-align:left">
            ⚠&nbsp; This is a mocked OIDC redirect — no real authentication occurs
          </div>
          <div style="background:${C.gray50};border:1px solid ${C.gray200};border-radius:8px;padding:14px;font-size:12.5px;text-align:left;margin-bottom:20px">
            <div style="margin-bottom:6px"><strong>IdP Endpoint:</strong> idp.pgim.lk/oauth2/authorize</div>
            <div style="margin-bottom:6px"><strong>Flow:</strong> Authorization Code (PKCE)</div>
            <div style="margin-bottom:6px"><strong>Scope:</strong> openid profile email roles</div>
            <div style="margin-bottom:6px"><strong>Redirect URI:</strong> lms.pgim.lk/auth/callback</div>
            <div><strong>Role:</strong> <span style="color:${C.crimson};font-weight:700">${(APP.loginSelected || "").toUpperCase()}</span></div>
          </div>
          ${btn("sso-complete", APP.loginLoading ? "Authenticating…" : "✓ Authorize &amp; Return to LMS", "primary", "lg")}
          <p style="font-size:11px;color:${C.gray300};margin-top:12px">PoC Demo — Synthetic Data Only · PGIM LMS v1.0</p>
        </div>
      `, "max-width:440px;width:100%")}
    </div>`;
  }

  return `<div style="min-height:100vh;background:linear-gradient(150deg,${C.crimsonDark} 0%,${C.crimson} 55%,#7A0000 100%);display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="max-width:440px;width:100%">

      <!-- Header -->
      <div style="text-align:center;margin-bottom:32px">
        <div style="width:90px;height:90px;border-radius:50%;background:${C.goldPale};border:3px solid ${C.gold};box-shadow:0 0 0 4px rgba(201,146,42,0.25);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px">🏥</div>
        <h1 style="color:${C.white};font-size:24px;margin:0;font-weight:800">PGIM Learning Management System</h1>
        <p style="color:rgba(255,255,255,0.65);font-size:13px;margin:8px 0 0">Postgraduate Institute of Medicine — Sri Lanka</p>
      </div>

      <!-- Login Card -->
      ${card(`
        <h3 style="margin:0 0 20px;color:${C.crimson};font-size:17px;font-weight:800;text-align:center">Sign In to Your Account</h3>

        <!-- Email -->
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:12px;font-weight:700;color:${C.gray700};margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px">Email Address</label>
          <input id="login-email" type="email" placeholder="yourname@pgim.lk"
            style="width:100%;padding:12px 14px;border:1.5px solid ${C.gray200};border-radius:8px;font-size:14px;color:${C.gray800};outline:none;box-sizing:border-box;font-family:inherit" />
        </div>

        <!-- Password -->
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:700;color:${C.gray700};margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px">Password</label>
          <input id="login-password" type="password" placeholder="••••••••"
            style="width:100%;padding:12px 14px;border:1.5px solid ${C.gray200};border-radius:8px;font-size:14px;color:${C.gray800};outline:none;box-sizing:border-box;font-family:inherit" />
        </div>

        <!-- Error message -->
        <div id="login-error" style="display:none;background:${C.redBg};color:${C.red};padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;font-weight:600">
          ❌ Wrong email or password. Please try again.
        </div>

        <!-- Sign In Button -->
        <button id="login-btn" data-action="real-login"
          style="width:100%;padding:13px;background:${C.crimson};color:${C.white};border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit">
          Sign In →
        </button>

        <!-- Hint -->
        <div style="margin-top:20px;background:${C.gray50};border-radius:8px;padding:14px;font-size:12px;color:${C.gray500}">
          <div style="font-weight:700;margin-bottom:8px;color:${C.gray700}">Demo Credentials:</div>
          <div style="margin-bottom:4px">🛡️ Admin &nbsp;&nbsp;&nbsp;→ admin@pgim.lk / Admin@1234</div>
          <div style="margin-bottom:4px">📋 Examiner → examiner@pgim.lk / Examiner@1234</div>
          <div>🎓 Trainee &nbsp;→ trainee@pgim.lk / Trainee@1234</div>
        </div>
      `, "padding:28px")}

      <p style="text-align:center;color:rgba(255,255,255,0.3);font-size:11px;margin-top:16px">
        Role-Based Access Control (RBAC) · PGIM LMS PoC · 2026
      </p>
    </div>
  </div>`;
}

// ─── SHELL ────────────────────────────────────────────────────────────────────
function buildShell(content) {
  const u = APP.user;
  const roleKey = u.role.toLowerCase();
  const roleColor = { admin: C.crimson, examiner: C.gold, trainee: C.green }[roleKey];
  const roleBadge = { admin: "crimson", examiner: "gold", trainee: "green" }[roleKey];

  const navMap = {
    admin: [
  { k: "dashboard",   label: "Dashboard",          icon: "📊" },
  { k: "admissions",  label: "Admissions",          icon: "📝" },
  { k: "exams",       label: "Examinations",        icon: "📄" },
  { k: "reports",     label: "Reports & Analytics", icon: "📈" },
  { k: "audit",       label: "Audit Log",           icon: "🔍" },
  { k: "assignments", label: "Assignments",         icon: "📎" },  // ← ADD THIS
  { k: "switchrole",  label: "Switch Role",         icon: "⇄", special: true },
],
    examiner: [
      { k: "dashboard",        label: "Dashboard",         icon: "📊" },
      { k: "portfolio-review", label: "Portfolio Review",  icon: "📋" },
      { k: "exams",            label: "My Exams",          icon: "📄" },
    ],
    trainee: [
  { k: "dashboard",   label: "Dashboard",            icon: "📊" },
  { k: "courses",     label: "Course Registration",  icon: "📚" },
  { k: "portfolio",   label: "e-Portfolio / Logbook", icon: "📁" },
  { k: "exams",       label: "Examinations",          icon: "📄" },
  { k: "assignments", label: "Assignments",           icon: "📎" },  // ← ADD THIS
],
  };

  const navItems = (navMap[roleKey] || []).map(item => {
    const active = APP.nav === item.k;
    return `<div data-action="nav" data-nav="${item.k}" style="padding:11px 18px;cursor:pointer;display:flex;align-items:center;gap:11px;background:${active ? "rgba(255,255,255,0.13)" : "transparent"};border-left:3px solid ${active ? C.gold : "transparent"};color:${active ? C.white : item.special ? C.goldLight : "rgba(255,255,255,0.6)"};font-size:13.5px;transition:all 0.13s;margin-bottom:1px">
      <span style="font-size:16px">${item.icon}</span><span>${item.label}</span>
    </div>`;
  }).join("");

// ─── ROLE SWITCH MODAL ────────────────────────────────────────────────────────
function buildRoleSwitchModal() {
  const opts = [
    { key: "admin",    label: "Administrator",        icon: "🛡️" },
    { key: "examiner", label: "Examiner / Supervisor", icon: "📋" },
    { key: "trainee",  label: "Trainee / Candidate",   icon: "🎓" },
  ].filter(o => o.key !== APP.user.role.toLowerCase());

  const optCards = opts.map(o => {
    const sel = APP.modalData.switchTarget === o.key;
    return `<div data-action="switch-target" data-role="${o.key}" style="border:2px solid ${sel ? C.crimson : C.gray200};border-radius:8px;padding:12px 16px;cursor:pointer;background:${sel ? "#FCE7E7" : C.white};display:flex;align-items:center;gap:12px;transition:all 0.13s">
      <span style="font-size:24px">${o.icon}</span>
      <span style="font-weight:700;color:${sel ? C.crimson : C.gray800}">${o.label}</span>
      ${sel ? `<span style="margin-left:auto;color:${C.crimson};font-weight:700">✓</span>` : ""}
    </div>`;
  }).join("");

  const target = APP.modalData.switchTarget;
  const targetLabel = target ? opts.find(o => o.key === target)?.label : "—";

  const content = `
    <p style="color:${C.gray500};font-size:13px;margin-top:0">As Administrator, you can switch to another role context to view the system from their perspective.</p>
    <div style="background:${C.amberBg};border-radius:8px;padding:12px;font-size:13px;color:${C.amber};margin-bottom:18px">
      🔑 Current role: <strong>${APP.user.role}</strong> · Token re-issued on switch (simulated)
    </div>
    <div style="display:grid;gap:10px;margin-bottom:20px">${optCards}</div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      ${btn("close-modal", "Cancel", "ghost")}
      ${btn("execute-switch", `Switch to ${targetLabel}`, "primary", "md", !target)}
    </div>`;
  return modalWrap("Switch Active Role (Admin Privilege)", content);
}

  return sectionTitle("Examination Management",
    "Journey 4: Session creation, results publication, appeal handling",
    btn("create-exam-open", "+ Create Exam Session", "primary")) +

// ─── TOAST ────────────────────────────────────────────────────────────────────
function buildToast() {
  if (!APP.toast) return "";
  const t = APP.toast;
  const bg = t.type==="success" ? C.green : t.type==="error" ? C.red : C.navy;
  return `<div style="position:fixed;bottom:28px;right:28px;z-index:2000;background:${bg};color:${C.white};padding:13px 22px;border-radius:10px;font-weight:600;font-size:13.5px;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px">
    <span style="font-size:16px">${t.type==="success"?"✓":"⚠"}</span> ${t.msg}
  </div>`;
}

// ─── MAIN BUILD ───────────────────────────────────────────────────────────────
function buildApp() {
  if (!APP.user) return buildLogin() + buildToast();

  const roleKey = APP.user.role.toLowerCase();
  let content = "";

  if (roleKey === "admin") {
    if (APP.nav === "dashboard")  content = buildAdminDashboard();
    else if (APP.nav === "admissions") content = buildAdminAdmissions();
    else if (APP.nav === "exams")      content = buildAdminExams();
    else if (APP.nav === "reports")    content = buildAdminReports();
    else if (APP.nav === "audit")      content = buildAuditLog();
    else if (APP.nav === "assignments") content = buildAdminAssignments();
  } else if (roleKey === "examiner") {
    if (APP.nav === "dashboard")        content = buildExaminerDashboard();
    else if (APP.nav === "portfolio-review") content = buildExaminerPortfolioReview();
    else if (APP.nav === "exams")            content = buildExaminerExams();
  } else if (roleKey === "trainee") {
    if (APP.nav === "dashboard")  content = buildTraineeDashboard();
    else if (APP.nav === "courses")   content = buildTraineeCourses();
    else if (APP.nav === "portfolio") content = buildTraineePortfolio();
    else if (APP.nav === "exams")     content = buildTraineeExams();
    else if (APP.nav === "assignments") content = buildTraineeAssignments();
  }

  let html = buildShell(content);
  if (APP.showRoleSwitch) html += buildRoleSwitchModal();
  html += buildToast();
  return html;
}

// ─── EVENT HANDLER ────────────────────────────────────────────────────────────
function attachEvents() {
  document.addEventListener("click", handleClick, { once: true });
  document.addEventListener("change", handleChange, { once: true });
}

function handleChange(e) {
  // Re-attach after handling
  document.addEventListener("change", handleChange, { once: true });
}

function handleClick(e) {
  // Re-attach first so we don't lose events
  document.addEventListener("click", handleClick, { once: true });

  const el = e.target.closest("[data-action]");
  if (!el) return;

  const action = el.dataset.action;

  // ── Login ──
  if (action === "select-role") {
    APP.loginSelected = el.dataset.role;
    render(); return;
  }
  if (action === "real-login") {
  const email = document.getElementById('login-email')?.value || '';
  const password = document.getElementById('login-password')?.value || '';
  const errDiv = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  if (!email || !password) {
    errDiv.style.display = 'block';
    errDiv.textContent = '❌ Please enter both email and password.';
    return;
  }

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  errDiv.style.display = 'none';

  fetch('http://localhost:3001/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  })
  .then(r => r.json())
  .then(data => {
    if (data.token) {
      localStorage.setItem('pgim_token', data.token);
      const roleKey = data.user.role.toLowerCase();
      const initials = data.user.name.split(' ').slice(-2).map(n => n[0]).join('');
      APP.user = {
        ...USERS[roleKey],
        id:       data.user.id,
        name:     data.user.name,
        email:    data.user.email,
        role:     data.user.role.charAt(0) + data.user.role.slice(1).toLowerCase(),
        title:    data.user.title,
        initials: initials,
      };
      APP.nav = 'dashboard';
      APP.modalData = {};
      render();
    } else {
      btn.textContent = 'Sign In →';
      btn.disabled = false;
      errDiv.style.display = 'block';
      errDiv.textContent = '❌ ' + (data.error || 'Login failed');
    }
  })
  .catch(() => {
    btn.textContent = 'Sign In →';
    btn.disabled = false;
    errDiv.style.display = 'block';
    errDiv.textContent = '❌ Cannot reach server. Is the backend running?';
  });
  return;
}
  if (action === "sso-complete") {
  APP.loginLoading = true; render();

  const creds = {
    admin:    { email: 'admin@pgim.lk',    password: 'Admin@1234'    },
    examiner: { email: 'examiner@pgim.lk', password: 'Examiner@1234' },
    trainee:  { email: 'trainee@pgim.lk',  password: 'Trainee@1234'  },
  };

  const { email, password } = creds[APP.loginSelected];

  fetch('http://localhost:3001/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  })
  .then(r => r.json())
  .then(data => {
    if (data.token) {
      localStorage.setItem('pgim_token', data.token);

      const roleKey = data.user.role.toLowerCase();
      const initials = data.user.name.split(' ').slice(-2).map(n => n[0]).join('');

      APP.user = {
        ...USERS[roleKey],
        id:       data.user.id,
        name:     data.user.name,
        email:    data.user.email,
        role:     data.user.role.charAt(0) + data.user.role.slice(1).toLowerCase(),
        title:    data.user.title,
        initials: initials,
      };

      APP.loginPhase = 'select';
      APP.loginSelected = null;
      APP.loginLoading = false;
      APP.nav = 'dashboard';
      APP.modalData = {};
      render();
    } else {
      APP.loginLoading = false;
      render();
      showToast('Login failed: ' + data.error, 'error');
    }
  })
  .catch(() => {
    APP.loginLoading = false;
    render();
    showToast('Cannot reach server. Make sure backend is running!', 'error');
  });
  return;
}

  // ── Shell ──
  if (action === "nav") {
    const nav = el.dataset.nav;
    if (nav === "switchrole") { APP.showRoleSwitch = true; APP.modalData = {}; render(); return; }
    APP.nav = nav; APP.modal = null; APP.modalData = {}; render();
    if (nav === 'assignments' && APP.user.role === 'Admin') loadAdminDocs();
    if (nav === 'assignments' && APP.user.role === 'Trainee') loadTraineeDocs();
return;
  }
  if (action === "logout") {
    APP.user = null; APP.nav = "dashboard"; APP.prevRole = null; APP.modal = null; APP.modalData = {}; APP.loginPhase = "select"; render(); return;
  }
  if (action === "return-admin") {
    APP.user = USERS.admin; APP.nav = "dashboard"; APP.prevRole = null; APP.modal = null; render();
    showToast("Returned to Admin view", "success"); return;
  }

  // ── Role Switch ──
  if (action === "switch-target") {
    APP.modalData.switchTarget = el.dataset.role; render(); return;
  }
  if (action === "execute-switch") {
    const t = APP.modalData.switchTarget;
    if (!t) return;
    if (!APP.prevRole) APP.prevRole = APP.user.role.toLowerCase();
    const prev = APP.user.role;
    APP.user = USERS[t]; APP.nav = "dashboard"; APP.showRoleSwitch = false; APP.modalData = {};
    addAudit(`Role switched from ${prev} to ${APP.user.role} (token simulation)`);
    render(); showToast(`Switched to ${APP.user.role} view`, "success"); return;
  }

  // ── Modal Close ──
  if (action === "close-modal" || action === "modal-overlay") {
    APP.modal = null; APP.modalData = {}; render(); return;
  }

  // ── Admissions ──
  if (action === "open-reg-new" || action.startsWith("open-reg-C")) {
    APP.modal = "adm-step1";
    APP.modalData = { course: action.startsWith("open-reg-C") ? action.replace("open-reg-","") : "C001" };
    render(); return;
  }
  if (action === "adm-next-2") {
    const first = document.getElementById("adm-first")?.value || "";
    const last = document.getElementById("adm-last")?.value || "";
    const email = document.getElementById("adm-email")?.value || "";
    const nic = document.getElementById("adm-nic")?.value || "";
    const slmc = document.getElementById("adm-slmc")?.value || "";
    const phone = document.getElementById("adm-phone")?.value || "";
    const course = document.getElementById("adm-course")?.value || APP.modalData.course || "C001";
    if (!first || !email || !nic) { showToast("Please fill required fields", "error"); return; }
    APP.modalData = { ...APP.modalData, firstName: first, lastName: last, email, nic, slmc, phone, course };
    APP.modal = "adm-step2"; render(); return;
  }
  if (action === "adm-back-1") { APP.modal = "adm-step1"; render(); return; }
  if (action === "adm-confirm-pay") {
    APP.modal = "adm-step3";
    addAudit(`Registered candidate ${APP.modalData.firstName} ${APP.modalData.lastName} for ${COURSES.find(c=>c.id===APP.modalData.course)?.name} — mock payment confirmed`);
    render(); showToast("Payment confirmed! Enrolment successful.", "success"); return;
  }
  if (action === "adm-download") { showToast("Admission card downloaded (PDF)", "success"); APP.modal = null; APP.modalData = {}; render(); return; }
  if (action === "export-csv-adm") { showToast("Enrolment list exported as CSV", "success"); return; }
  if (action === "export-pdf-adm") { showToast("Enrolment list exported as PDF", "success"); return; }

  // ── Admin Exams ──
  if (action === "create-exam-open") { APP.modal = "create-exam"; APP.modalData = {}; render(); return; }
  if (action === "manage-results")    { APP.modal = "results"; render(); return; }
  if (action === "publish-all") {
    RESULTS = RESULTS.map(r => ({ ...r, published: true }));
    addAudit("Published examination results for EX001 — MD Internal Medicine Part I");
    APP.modal = null; render(); showToast("Results published to all candidates", "success"); return;
  }
  if (action.startsWith("review-appeal-")) {
    const id = action.replace("review-appeal-","");
    APP.modal = "appeal-review"; APP.modalData = { ...APP.modalData, appealResult: RESULTS.find(r=>r.id===id) }; render(); return;
  }
  if (action === "back-to-results") { APP.modal = "results"; render(); return; }
  if (action === "accept-appeal" || action === "reject-appeal") {
    const decision = action === "accept-appeal" ? "Accepted" : "Rejected";
    const dec = document.getElementById("appeal-decision")?.value || decision;
    const res = document.getElementById("appeal-response")?.value || "";
    if (!dec) { showToast("Please select a decision", "error"); return; }
    const r = APP.modalData.appealResult;
    RESULTS = RESULTS.map(x => x.id === r.id ? { ...x, appealStatus: dec } : x);
    addAudit(`Appeal by ${r.candidate} — ${dec}`);
    APP.modal = null; APP.modalData = {}; render(); showToast(`Appeal ${dec.toLowerCase()}`, "success"); return;
  }
  if (action === "create-exam-confirm") {
    const name = document.getElementById("ex-name")?.value || "";
    addAudit(`Created new exam session: ${name}`);
    APP.modal = null; APP.modalData = {}; render(); showToast("Exam session created successfully", "success"); return;
  }
  if (action.startsWith("send-admission-")) { addAudit("Admission cards sent"); showToast("Admission cards sent to all registered candidates", "success"); return; }

  // ── Reports ──
  if (action === "report-tab") { APP.modalData.reportTab = el.dataset.tab; render(); return; }
  if (action.startsWith("drilldown-")) {
    const id = action.replace("drilldown-","");
    const c = COURSES.find(c => c.id === id);
    if (c) { APP.modal = "drilldown"; APP.modalData = { ...APP.modalData, drilldownCourse: c }; render(); return; }
  }
  if (action === "drilldown-csv") { showToast("Drill-down exported as CSV", "success"); APP.modal = null; render(); return; }
  if (action === "drilldown-pdf") { showToast("Drill-down exported as PDF", "success"); APP.modal = null; render(); return; }
  if (action === "export-csv-rep") { showToast("Report exported as CSV", "success"); return; }
  if (action === "export-pdf-rep") { showToast("Report exported as PDF", "success"); return; }

  // ── Examiner Portfolio Review ──
  if (action.startsWith("exm-review-")) {
    const id = action.replace("exm-review-","");
    APP.modal = "exm-review"; APP.modalData = { reviewId: id }; render(); return;
  }
  if (action === "exm-signoff") {
    const grade = document.getElementById("exm-grade")?.value || "";
    const fb = document.getElementById("exm-feedback")?.value || "";
    if (!grade || !fb) { showToast("Please fill grade and feedback", "error"); return; }
    const id = APP.modalData.reviewId;
    const entry = PORTFOLIO_ENTRIES.find(e => e.id === id);
    PORTFOLIO_ENTRIES = PORTFOLIO_ENTRIES.map(e => e.id === id ? { ...e, status: "Signed Off", feedback: fb, grade } : e);
    addAudit(`Signed off portfolio entry "${entry?.title}" — ${USERS.trainee.name}`);
    APP.modal = null; APP.modalData = {}; render(); showToast("Portfolio entry signed off successfully", "success"); return;
  }

  // ── Trainee Courses ──
  if (action.startsWith("tr-course-reg-")) {
    const id = action.replace("tr-course-reg-","");
    APP.modal = "tr-course-step1"; APP.modalData = { courseId: id }; render(); return;
  }
  if (action === "tr-course-step2") { APP.modal = "tr-course-step2"; render(); return; }
  if (action === "tr-course-back1") { APP.modal = "tr-course-step1"; render(); return; }
  if (action === "tr-course-pay") {
    addAudit(`Registered for course — mock payment confirmed`);
    APP.modal = "tr-course-step3"; render(); showToast("Registered successfully!", "success"); return;
  }
  if (action === "tr-course-dl") { showToast("Admission card downloaded (PDF)", "success"); APP.modal = null; APP.modalData = {}; render(); return; }

  // ── Trainee Portfolio ──
  if (action === "portfolio-filter") { APP.modalData.portfolioFilter = el.dataset.filter; render(); return; }
  if (action === "tr-add-entry-open") { APP.modal = "tr-add-entry"; render(); return; }
  if (action === "tr-save-draft" || action === "tr-save-share") {
    const type = document.getElementById("tr-e-type")?.value || "";
    const title = document.getElementById("tr-e-title")?.value || "";
    const date = document.getElementById("tr-e-date")?.value || "";
    const comp = document.getElementById("tr-e-comp")?.value || "";
    if (!title || !type) { showToast("Please fill required fields", "error"); return; }
    const share = action === "tr-save-share";
    const id = "P00" + (PORTFOLIO_ENTRIES.length + 1);
    PORTFOLIO_ENTRIES.push({ id, type: type||"Clinical Case", title, date: date||new Date().toISOString().slice(0,10), competency: comp||"Clinical Reasoning", status: share?"Pending Review":"Draft", feedback:"", grade:"" });
    addAudit(`Added portfolio entry: ${title}${share?" — shared with supervisor":""}`);
    APP.modal = null; APP.modalData = {}; render(); showToast(share?"Entry added and shared with supervisor":"Entry saved as draft","success"); return;
  }
  if (action.startsWith("tr-share-")) {
    const id = action.replace("tr-share-","");
    PORTFOLIO_ENTRIES = PORTFOLIO_ENTRIES.map(e => e.id===id ? {...e,status:"Pending Review"} : e);
    addAudit(`Shared portfolio entry ${id} with supervisor for review`);
    render(); showToast("Entry shared with supervisor for review","success"); return;
  }

  // ── Trainee Exams ──
  if (action.startsWith("tr-exam-reg-")) {
    const id = action.replace("tr-exam-reg-","");
    APP.modal = "tr-exam-step1"; APP.modalData = { selectedExamId: id }; render(); return;
  }
  if (action === "tr-exam-step2") { APP.modal = "tr-exam-step2"; render(); return; }
  if (action === "tr-exam-back1") { APP.modal = "tr-exam-step1"; render(); return; }
  if (action === "tr-exam-pay") {
    const se = EXAMS.find(e => e.id === APP.modalData.selectedExamId);
    addAudit(`Registered for exam: ${se?.name} — mock payment LKR ${se?.fee}`);
    APP.modal = "tr-exam-step3"; render(); showToast("Exam registration confirmed!","success"); return;
  }
  if (action === "tr-exam-dl") { showToast("Admission card downloaded (PDF)","success"); APP.modal=null; APP.modalData={}; render(); return; }
  if (action === "tr-appeal-open") { APP.modal = "tr-appeal"; APP.modalData = {}; render(); return; }
  if (action === "tr-appeal-submit") {
    const type = document.getElementById("tr-appeal-type")?.value || "";
    const text = document.getElementById("tr-appeal-text")?.value || "";
    if (!text || !type) { showToast("Please fill all required fields","error"); return; }
    RESULTS = RESULTS.map(r => r.pgimId==="TRN-001" ? {...r,appealed:true,appealText:text,appealStatus:null} : r);
    addAudit(`Submitted appeal for exam EX001 — Grounds: ${text.slice(0,40)}…`);
    APP.modal=null; APP.modalData={}; render(); showToast("Appeal submitted successfully","success"); return;
  }
  if (action === "tr-dl-adm-card") { showToast("Admission card downloaded (PDF)","success"); return; }
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
render();


async function adminUploadPDF() {
  const fileInput = document.getElementById('pdf-file-input');
  if (!fileInput.files[0]) return alert('Please select a PDF first');
  const formData = new FormData();
  formData.append('pdf', fileInput.files[0]);
  formData.append('uploadedBy', APP.user.name);
  await fetch('http://localhost:3001/api/documents/upload', { method: 'POST', body: formData });
  loadAdminDocs(); // refresh list
}

async function loadAdminDocs() {
  const res = await fetch('http://localhost:3001/api/documents');
  const docs = await res.json();
  const html = docs.map(d => `
    <div style="display:flex;align-items:center;gap:12px;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px">
      <span>📄 ${d.originalName}</span>
      <span style="color:#999;font-size:12px">${new Date(d.uploadedAt).toLocaleDateString()}</span>
      <button onclick="adminDeleteDoc(${d.id})" style="margin-left:auto;padding:4px 12px;background:#e74c3c;color:white;border:none;border-radius:4px;cursor:pointer">🗑 Delete</button>
    </div>`).join('') || '<p style="color:#999">No documents uploaded yet.</p>';
  document.getElementById('admin-doc-list').innerHTML = html;
}

async function adminDeleteDoc(id) {
  if (!confirm('Delete this document? Trainees will no longer see it.')) return;
  await fetch(`http://localhost:3001/api/documents/${id}`, { method: 'DELETE' });
  loadAdminDocs();
}

function buildTraineeAssignments() {
  return sectionTitle("Assignments", "Resources uploaded by your administrator") +
    `<div id="trainee-doc-list">Loading...</div>`;
}

async function loadTraineeDocs() {
  const res = await fetch('http://localhost:3001/api/documents');
  const docs = await res.json();
  const html = docs.map(d => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px">
      <span>📄 ${d.originalName}</span>
      <a href="http://localhost:3001/uploads/${d.fileName}" target="_blank"
         style="margin-left:auto;padding:6px 14px;background:#2980b9;color:white;border-radius:4px;text-decoration:none">👁 View</a>
      <a href="http://localhost:3001/uploads/${d.fileName}" download="${d.originalName}"
         style="padding:6px 14px;background:#27ae60;color:white;border-radius:4px;text-decoration:none">⬇ Download</a>
    </div>`).join('') || '<p style="color:#999">No assignments yet.</p>';
  document.getElementById('trainee-doc-list').innerHTML = html;
}

</script>
